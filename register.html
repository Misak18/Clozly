<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Clozly.AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Open+Sans:wght@400;600;700&display=swap');

        :root {
            --font-header: 'Dela Gothic One', sans-serif;
            --font-main: 'Open Sans', sans-serif;
            --accent: #49b7f7;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column; /* Элементы идут друг под другом */
    background: linear-gradient(180deg, #020408 0%, #050c1f 50%, #2159b3 100%);
    background-attachment: fixed;
    color: #ffffff;
    font-family: var(--font-main);
}

.auth-container {
    width: 100%;
    max-width: 450px;
    padding: 20px;
    margin: auto; /* ЭТО КЛЮЧЕВОЙ МОМЕНТ: выравнивает блок по центру во flex-контейнере */
    animation: fadeIn 0.8s ease-out;
    display: flex;
    align-items: center; 
    justify-content: center;
}
        
        
        .main-header {
            width: 100%;
            padding: 40px 0 10px;
            text-align: center;
        }

        .main-header h1 {
            font-family: var(--font-header);
            font-size: 32px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }


        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 45px 40px; /* Как в login.html */
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .auth-card h2 {
            font-family: var(--font-header);
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            text-transform: uppercase;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 15px;
        }

        #form-steps-outer {
            overflow: hidden;
            width: 100%;
        }

        #form-steps-container {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 200%;
        }

        .form-step {
            width: 50%;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Контейнер для кнопки глаза (как в login.html) */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Добавляем отступ справа для инпута пароля */
        .input-wrapper input {
            padding-right: 50px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(73, 183, 247, 0.15);
        }

        .toggle-password-visibility {
            position: absolute;
            right: 15px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .toggle-password-visibility:hover {
            opacity: 1;
        }

        .toggle-password-visibility img {
            width: 20px;
            height: 20px;
        }

        .agreement-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .agreement-group input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .btn-submit, .btn-next {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2864c8, #004696);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-back {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-submit:hover, .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 70, 150, 0.5);
        }

        .auth-link-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .auth-link-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 35px 25px; }
            .auth-card h2 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <form id="register-form">
                <h2>Регистрация</h2>
                <p class="auth-subtitle">Создайте аккаунт магазина</p>
                
                <div id="register-message" class="message-box"></div>
                
                <div id="form-steps-outer">
                    <div id="form-steps-container">
                        
                        <div class="form-step" id="step-one">
                            <div class="form-group">
                                <label>Email / Телефон</label>
                                <input type="email" id="register-email" name="email" placeholder="example@mail.ru" required>
                            </div>
                            <div class="form-group">
                                <label>Пароль</label>
                                <div class="input-wrapper">
                                     <input type="password" id="register-password" name="password" placeholder="••••••••" required>
                                     <button type="button" class="toggle-password-visibility" id="toggle-password-register">
                                        <img src="https://img.icons8.com/material-outlined/24/f1f1f1/visible.png" alt="Показать">
                                     </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Тип организации</label>
                                <select id="organization-type" name="organization_type" required>
                                    <option value="" disabled selected>Выберите тип...</option>
                                    <option value="онлайн магазин">Онлайн магазин</option>
                                    <option value="бренд магазин">Бренд магазин</option>
                                    <option value="шоурум">Шоурум</option>
                                </select>
                            </div>
                            <div class="form-group agreement-group">
                                <input type="checkbox" id="terms-agree" name="terms-agree" required>
                                <label for="terms-agree">
                                    Я согласен с <a href="/consent-to-data-processing.html">Соглашением</a> и <a href="/privacy-policy-tryon.html">Политикой</a>
                                </label>
                            </div>
                            <button type="button" class="btn-next" id="send-code-button">Далее</button>
                        </div>

                        <div class="form-step" id="step-two">
                            <div class="form-group">
                                <label>Код верификации</label>
                                <input type="text" id="verification-code" name="verification_code" maxlength="6" placeholder="000000">
                                <p style="font-size: 13px; margin-top: 10px; color: rgba(255,255,255,0.5);">
                                    Не получили код? <a href="#" style="color: var(--accent); text-decoration: none;">Повторить</a>
                                </p>
                            </div>
                            <div class="btn-row">
                                <button type="button" class="btn-back" id="back-to-step-one">Назад</button>
                                <button type="submit" class="btn-submit">Готово</button>
                            </div>
                        </div>

                    </div>
                </div>

                <p class="auth-link-footer">Уже зарегистрированы? <a href="login.html">Войти</a></p>
            </form>
        </div>
    </main>

    <script src="js/auth_client.js" type="module"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const formStepsContainer = document.getElementById('form-steps-container');
            const sendCodeButton = document.getElementById('send-code-button');
            const backButton = document.getElementById('back-to-step-one');

            // Переход на Шаг 2
            sendCodeButton.addEventListener('click', () => {
                const fields = [
                    document.getElementById('register-email'),
                    document.getElementById('register-password'),
                    document.getElementById('organization-type'),
                    document.getElementById('terms-agree')
                ];
                let isValid = true;
                fields.forEach(f => { if(!f.checkValidity()) { f.reportValidity(); isValid = false; } });

                if (isValid) {
                    formStepsContainer.style.transform = 'translateX(-50%)';
                }
            });

            // Назад
            backButton.addEventListener('click', () => {
                formStepsContainer.style.transform = 'translateX(0)';
            });
        });
    </script>
</body>
</html>
